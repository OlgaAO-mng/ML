<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Мини-курс</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ========== СТИЛИ И ЦВЕТОВАЯ ПАЛИТРА ========== */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --success:   #34d399;
      --danger:    #f87171;
      --text:      #e8eaf6;
      --muted:     #7b82a8;
      --border:    rgba(108,99,255,0.18);
      --radius:    14px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== ЗАГРУЗКА И СПИННЕР ========== */
    .loading-screen {
      position: fixed;
      top:0; left:0; width:100vw; height:100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== ШАПКА КУРСА И ВКЛАДКИ ========== */
    header {
      padding: 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0; z-index: 100;
    }
    .nav-container {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .nav-container::-webkit-scrollbar { height: 4px; }
    .nav-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tab-btn {
      background: var(--surface2);
      border: 1px solid transparent;
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(108,99,255,0.3);
    }
    .tab-btn.locked {
      opacity: 0.35;
      cursor: not-allowed;
      background: #12141f;
    }

    /* ========== КОНТЕНТНЫЕ КАРТОЧКИ ========== */
    main { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; width: 100%; }
    
    .video-container { 
      position: relative; padding-bottom: 56.25%; height: 0; 
      border-radius: var(--radius); overflow: hidden; background: #000; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid var(--border); 
    }
    .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .card h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .card h3 { font-size: 15px; margin-bottom: 6px; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.5px; }
    .card p { font-size: 15px; line-height: 1.6; color: var(--text); opacity: 0.95; font-weight: normal;}

    /* ========== ПОЛЯ ОТПРАВКИ ЗАДАНИЯ ========== */
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    label { font-size: 13px; color: var(--muted); font-weight: 600; }
    textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px; font-family: inherit; font-size: 15px; resize: none; height: 110px; transition: border-color 0.2s; }
    textarea:focus { outline: none; border-color: var(--accent); }
    
    .file-upload-box { position: relative; margin-top: 4px; }
    .file-upload-box input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    .file-mock-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface2); border: 1px dashed var(--border); padding: 12px; border-radius: 10px; font-size: 14px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .file-mock-btn:hover { border-color: var(--accent); color: var(--text); }

    .btn-submit { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(108,99,255,0.25); margin-top: 12px; width: 100%; }
    .btn-submit:hover { background: #5b52e5; }
    .btn-submit:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* ========== ИНТЕРФЕЙС ИИ-РЕЦЕНЗИИ ========== */
    .feedback-container { display: none; border-radius: var(--radius); padding: 16px; margin-top: 15px; line-height: 1.6; font-size: 14px; border-left: 4px solid transparent; white-space: pre-wrap; }
    .feedback-container.visible { display: block; animation: slideUp 0.3s ease; }
    .feedback-container.success { background: rgba(52,211,153,0.08); border-color: var(--success); color: #a7f3d0; }
    .feedback-container.danger { background: rgba(248,113,113,0.08); border-color: var(--danger); color: #fca5a5; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ========== ФИНАЛЬНЫЙ ЭКРАН ========== */
    .finish-layout { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; flex: 1; gap: 12px; }
    .finish-layout.visible { display: flex; }
    .badge-grand { font-size: 56px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <p style="color: var(--muted); font-size: 14px;">Подключение к материалам курса...</p>
  </div>

  <div id="lessons-container" style="display: none;">
    <header>
      <div class="nav-container" id="lessons-nav"></div>
    </header>

    <main>
      <div class="video-container">
        <iframe id="video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

      <div class="card">
        <h2 id="lesson-title">Загрузка...</h2>
        <h3 id="case-title">Кейс</h3>
        <p id="case-text">Загрузка контента кейса...</p>
      </div>

      <div class="card">
        <h3>Задание урока</h3>
        <p id="task-text" style="margin-bottom: 12px;">Загрузка текста задания...</p>
        
        <form id="task-form">
          <div class="form-group">
            <label for="answer-text">Ваш ответ:</label>
            <textarea id="answer-text" placeholder="Опишите ваше решение кейса для проверки ментором..."></textarea>
          </div>

          <div class="form-group" id="photo-block">
            <label>Прикрепить изображение / скриншот решения (по желанию):</label>
            <div class="file-upload-box">
              <label class="file-mock-btn" id="file-label-text">
                <span>📁 Выбрать файл изображения</span>
              </label>
              <input type="file" id="photo-input" accept="image/*" onchange="document.getElementById('file-label-text').innerText='✅ Файл успешно выбран'"/>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="submit-btn">Отправить задание на проверку</button>
        </form>

        <div id="feedback-block-global" class="feedback-container">
          <p id="feedback-text-global"></p>
        </div>
      </div>
    </main>
  </div>

  <div id="finish-screen" class="finish-layout">
    <div class="badge-grand">🎓</div>
    <h2>Поздравляем!</h2>
    <p style="color: var(--muted); max-width: 320px; font-size: 15px; line-height: 1.5;">Вы успешно разобрали все бизнес-кейсы, получили зачеты от ИИ-ментора и завершили обучение!</p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ============================================================
    // НАСТРОЙКА: Замените на вашу актуальную ссылку из Google Apps Script
    // ============================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyXyVC4SFsrlntNGPHH3JdrmPp3HjmSMsuwOEY9LxqeED6EHrHzm9p1oTnGEn2T6QEb/exec";

    const userId = tg.initDataUnsafe?.user?.id || "test_user_local";

    let lessonsData = [];
    let maxAllowedLesson = 2; 
    let currentLessonIdx = 0;

    async function loadCourse() {
      try {
        const response = await fetch(`${GAS_URL}?action=getLessons`);
        lessonsData = await response.json();

        if (!lessonsData || lessonsData.length === 0) {
          alert("Лист 'Уроки' пуст.");
          return;
        }

        try {
          const progResponse = await fetch(`${GAS_URL}?action=getProgress&userId=${userId}`);
          const progData = await progResponse.json();
          maxAllowedLesson = parseInt(progData.maxAllowedLesson, 10) || 2;
        } catch(e) {
          maxAllowedLesson = 2;
        }

        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('lessons-container').style.display = 'block';

        renderTabs();
        switchLesson(currentLessonIdx);

      } catch (err) {
        console.error(err);
        document.getElementById('loading-screen').innerHTML = `<p style="color:var(--danger); padding:20px; text-align:center; font-size:14px;">Ошибка инициализации API.<br>Проверьте корректность ссылки GAS_URL.</p>`;
      }
    }

    function renderTabs() {
      const nav = document.getElementById('lessons-nav');
      nav.innerHTML = '';
      
      lessonsData.forEach((lesson, idx) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${idx === currentLessonIdx ? 'active' : ''}`;
        btn.id = `tab-btn-${idx}`;
        btn.textContent = `Урок ${lesson.id}`;
        
        if (parseInt(lesson.id, 10) > maxAllowedLesson) {
          btn.disabled = true;
          btn.classList.add('locked');
        }

        btn.onclick = () => {
          currentLessonIdx = idx;
          switchLesson(idx);
        };
        nav.appendChild(btn);
      });
    }

    function switchLesson(idx) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });

      const lesson = lessonsData[idx];
      
      document.getElementById('lesson-title').textContent = lesson.title;
      document.getElementById('video-iframe').src = toEmbedUrl(lesson.videoUrl);
      document.getElementById('case-title').textContent = lesson.caseTitle;
      document.getElementById('case-text').textContent = lesson.caseText;
      document.getElementById('task-text').textContent = lesson.taskText;

      document.getElementById('task-form').reset();
      document.getElementById('file-label-text').innerText = '📁 Выбрать файл изображения';
      document.getElementById('feedback-block-global').className = 'feedback-container';

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Отправить задание на проверку';
      
      document.getElementById('task-form').onsubmit = (e) => {
        e.preventDefault();
        handleTaskSubmit(lesson.id, idx);
      };
    }

    async function handleTaskSubmit(lessonId, idx) {
      const textAnswer = document.getElementById('answer-text').value.trim();
      const fileInput = document.getElementById('photo-input');
      const submitBtn = document.getElementById('submit-btn');
      
      if (!textAnswer) {
        alert("Пожалуйста, заполните текстовое поле ответа.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span>⏳ ИИ анализирует решение...</span>`;

      let photoBase64 = "";
      if (fileInput && fileInput.files.length > 0) {
        photoBase64 = await fileToBase64(fileInput.files[0]);
      }

      const payload = {
        action: "verifyAndSaveTask",
        userId: userId,
        lessonId: lessonId,
        answerText: textAnswer,
        photoBase64: photoBase64,
        taskText: lessonsData[idx].taskText
      };

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.approved) {
          showFeedback(`✅ ЗАЧЕТ!\n\nРазбор ментора:\n${result.feedback}`, 'success');
          submitBtn.textContent = 'Задание успешно выполнено!';
          
          try {
            const progResponse = await fetch(`${GAS_URL}?action=getProgress&userId=${userId}`);
            const progData = await progResponse.json();
            maxAllowedLesson = parseInt(progData.maxAllowedLesson, 10) || 2;
          } catch(e) {}

          setTimeout(() => {
            renderTabs();
            if (parseInt(lessonId, 10) === 3) {
              document.getElementById('lessons-container').style.display = 'none';
              document.getElementById('finish-screen').classList.add('visible');
            } else {
              if (maxAllowedLesson === 3 && idx !== 2) {
                currentLessonIdx = 2; 
                switchLesson(currentLessonIdx);
              }
            }
          }, 4000);

        } else {
          showFeedback(`❌ ЗАДАННЕ НЕ ЗАЧТЕТО\n\nЗамечания нейросети:\n${result.feedback}`, 'danger');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Отправить исправленный вариант';
        }

      } catch (e) {
        console.error(e);
        alert("Ошибка сервера.");
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить задание на проверку';
      }
    }

    // ИСПРАВЛЕНО: Умное сжатие фото через Canvas перед отправкой в ИИ
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            const MAX_WIDTH = 1200;
            
            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
            resolve(dataUrl.split(',')[1]);
          };
        };
        reader.onerror = (error) => reject(error);
      });
    }

    function toEmbedUrl(url) {
      if (!url) return '';
      if (url.includes('embed')) return url;
      const match = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      return match ? `https://www.youtube.com/embed/${match[1]}?rel=0` : url;
    }

    function showFeedback(text, type) {
      const block = document.getElementById('feedback-block-global');
      const textEl = document.getElementById('feedback-text-global');
      block.className = `feedback-block feedback-container visible ${type}`;
      textEl.innerText = text;
      block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    loadCourse();
  </script>
</body>
</html>
